<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — KNOWLEDGEBASE</title>

    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/pages/auth.css">
</head>
<body>

    <div class="auth-page">

        <!-- LEFT PANEL -->
        <div class="auth-left">
            <div class="auth-brand">
                <h1 class="auth-brand-name">KNOWLEDGE<span>BASE</span></h1>
                <p class="auth-tagline">Certify what you know.</p>

                <div class="auth-features">
                    <div class="auth-feature-item">
                        <div class="auth-feature-icon">🔒</div>
                        <span>Secure password reset process</span>
                    </div>
                    <div class="auth-feature-item">
                        <div class="auth-feature-icon">📧</div>
                        <span>OTP sent directly to your email</span>
                    </div>
                    <div class="auth-feature-item">
                        <div class="auth-feature-icon">✅</div>
                        <span>Back to your account in minutes</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- RIGHT PANEL -->
        <div class="auth-right">
            <div class="auth-form-wrapper">

                <div class="auth-form-header">
                    <h2 class="auth-form-title">Reset your password</h2>
                    <p class="auth-form-subtitle">
                        Enter the OTP sent to <strong id="displayEmail"></strong> and choose a new password.
                    </p>
                </div>

                <form class="auth-form" id="resetForm">

                    <div class="otp-inputs">
                        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" id="otp0">
                        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" id="otp1">
                        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" id="otp2">
                        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" id="otp3">
                        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" id="otp4">
                        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" id="otp5">
                    </div>

                    <div class="otp-timer" id="otpTimer">
                        OTP expires in <span id="countdown">10:00</span>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">New Password</label>
                        <div class="password-wrapper">
                            <input
                                type="password"
                                id="password"
                                name="password"
                                class="form-input"
                                placeholder="Minimum 6 characters"
                                autocomplete="new-password"
                            >
                            <button type="button" class="password-toggle" id="togglePassword">👁</button>
                        </div>
                        <span class="form-error hidden" id="passwordError"></span>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="confirmPassword">Confirm New Password</label>
                        <div class="password-wrapper">
                            <input
                                type="password"
                                id="confirmPassword"
                                name="confirmPassword"
                                class="form-input"
                                placeholder="Repeat your new password"
                                autocomplete="new-password"
                            >
                            <button type="button" class="password-toggle" id="toggleConf
