<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — KNOWLEDGEBASE</title>

    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/pages/auth.css">
</head>
<body>

    <div class="auth-page">

        <!-- LEFT PANEL -->
        <div class="auth-left">
            <div class="auth-brand">
                <h1 class="auth-brand-name">KNOWLEDGE<span>BASE</span></h1>
                <p class="auth-tagline">Certify what you know.</p>

                <div class="auth-features">
                    <div class="auth-feature-item">
                        <div class="auth-feature-icon">📝</div>
                        <span>Take structured certification exams</span>
                    </div>
                    <div class="auth-feature-item">
                        <div class="auth-feature-icon">✅</div>
                        <span>Validate your skills officially</span>
                    </div>
                    <div class="auth-feature-item">
                        <div class="auth-feature-icon">🏆</div>
                        <span>Earn verifiable certificates</span>
                    </div>
                    <div class="auth-feature-item">
                        <div class="auth-feature-icon">🔍</div>
                        <span>Share and verify credentials</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- RIGHT PANEL -->
        <div class="auth-right">
            <div class="auth-form-wrapper">

                <div class="auth-form-header">
                    <h2 class="auth-form-title">Welcome back</h2>
                    <p class="auth-form-subtitle">Log in to your KNOWLEDGEBASE account</p>
                </div>

                <form class="auth-form" id="loginForm">

                    <div class="form-group">
                        <label class="form-label" for="email">Email Address</label>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            class="form-input"
                            placeholder="john@example.com"
                            autocomplete="email"
                        >
                        <span class="form-error hidden" id="emailError"></span>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">Password</label>
                        <div class="password-wrapper">
                            <input
                                type="password"
                                id="password"
                                name="password"
                                class="form-input"
                                placeholder="Enter your password"
                                autocomplete="current-password"
                            >
                            <button type="button" class="password-toggle" id="togglePassword">👁</button>
                        </div>
                        <span class="form-error hidden" id="passwordError"></span>
                    </div>

                    <div class="forgot-link">
                        <a href="./forgot-password.html">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn btn-primary w-full btn-lg" id="loginBtn">
                        Log In
                    </button>

                </form>

                <div class="auth-form-footer mt-6">
                    Don't have an account? <a href="./register.html">Create one</a>
                </div>

            </div>
        </div>

    </div>

    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/pages/login.js"></script>

</body>
</html>
