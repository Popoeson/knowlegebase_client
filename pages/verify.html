<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Certificate — KNOWLEDGEBASE</title>

    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/pages/certificate.css">
</head>
<body>

<div class="verify-page">

    <!-- TOPBAR -->
    <header class="verify-topbar">
        <a href="../index.html">
            <span style="font-family: var(--font-heading); font-size: var(--text-lg); font-weight: var(--font-bold); color: var(--color-primary);">
                KNOWLEDGE<span style="color: var(--color-accent);">BASE</span>
            </span>
        </a>
        <div style="display: flex; gap: var(--space-3);">
            <a href="./login.html" class="btn btn-ghost btn-sm">Log In</a>
            <a href="./register.html" class="btn btn-primary btn-sm">Get Certified</a>
        </div>
    </header>

    <!-- BODY -->
    <div class="verify-body">
        <div class="verify-card">

            <div style="font-size: 3rem; margin-bottom: var(--space-4);">🔍</div>

            <h1 class="verify-title">Verify Certificate</h1>
            <p class="verify-subtitle">
                Enter a certificate ID to verify its authenticity.
                Anyone can verify a KNOWLEDGEBASE certificate for free.
            </p>

            <div class="verify-input-row">
                <input
                    type="text"
                    id="certIdInput"
                    class="form-input"
                    placeholder="e.g. KB-2026-A3F9K"
                    style="text-transform: uppercase; letter-spacing: 1px;"
                >
                <button class="btn btn-primary" id="verifyBtn">
                    Verify
                </button>
            </div>

            <div id="verifyResult" class="hidden"></div>

        </div>
    </div>

</div>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/pages/verify.js"></script>

</body>
</html>
