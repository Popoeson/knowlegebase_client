<html lang="en" data-theme="light">

<meta property="og:type" content="website">
<meta property="og:site_name" content="ASODEM">

<meta property="og:image" content="https://www.asodem.com/og.png">

<meta name="twitter:card" content="summary_large_image">

    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/pages/certificate.css">
    <link rel="stylesheet" href="../css/navbar.css">
</head>
<body>

<div class="verify-page">

    <!-- TOPBAR -->
    <header class="verify-topbar">
        <a href="../index.html" class="navbar-brand">
            <img src="../asset/images/logo3.png" alt="ASODEM Logo" class="navbar-logo">
        </a>
        <div style="display: flex; gap: var(--space-3);">
            <a href="./login.html" class="btn btn-ghost btn-sm">Log In</a>
            <a href="./register.html" class="btn btn-primary btn-sm">Get Certified</a>
        </div>
    </header>

    <!-- BODY -->
    <div class="verify-body">
        <div class="verify-card">

            <div style="font-size: 3rem; margin-bottom: var(--space-4);">🔍</div>

            <h1 class="verify-title">Verify Certificate</h1>
            <p class="verify-subtitle">
                Enter a certificate ID to verify its authenticity.
                Anyone can verify an ASODEM certificate for free.
            </p>

            <div class="verify-input-row">
                <input
                    type="text"
                    id="certIdInput"
                    class="form-input"
                    placeholder="e.g. ASO-2026-A3F9K"
                    style="text-transform: uppercase; letter-spacing: 1px;"
                >
                <button class="btn btn-primary" id="verifyBtn">
                    Verify
                </button>
            </div>

            <div id="verifyResult" class="hidden"></div>

        </div>
    </div>

</div>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/store.js"></script>
<script src="../js/auth.js"></script>

</body>
