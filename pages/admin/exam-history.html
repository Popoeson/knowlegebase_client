<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam History — KNOWLEDGEBASE</title>

    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/pages/dashboard.css">
    <link rel="stylesheet" href="../css/pages/courses.css">
</head>
<body>

<div class="app-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <span class="sidebar-brand-name">KNOWLEDGE<span>BASE</span></span>
        </div>

        <nav class="sidebar-nav">
            <div class="sidebar-nav-section">
                <p class="sidebar-nav-label">Main</p>
                <a href="./dashboard.html" class="sidebar-nav-item">
                    <span class="sidebar-nav-icon">🏠</span>
                    Dashboard
                </a>
                <a href="./courses.html" class="sidebar-nav-item">
                    <span class="sidebar-nav-icon">📚</span>
                    Courses
                </a>
            </div>

            <div class="sidebar-nav-section">
                <p class="sidebar-nav-label">My Activity</p>
                <a href="./exam-history.html" class="sidebar-nav-item active">
                    <span class="sidebar-nav-icon">📝</span>
                    Exam History
                </a>
                <a href="./certificates.html" class="sidebar-nav-item">
                    <span class="sidebar-nav-icon">🏆</span>
                    My Certificates
                </a>
                <a href="./transactions.html" class="sidebar-nav-item">
                    <span class="sidebar-nav-icon">💳</span>
                    Transactions
                </a>
            </div>

            <div class="sidebar-nav-section">
                <p class="sidebar-nav-label">Account</p>
                <a href="./profile.html" class="sidebar-nav-item">
                    <span class="sidebar-nav-icon">👤</span>
                    Profile
                </a>
            </div>
        </nav>

        <div class="sidebar-footer">
            <div class="sidebar-user">
                <div class="sidebar-avatar" id="sidebarAvatar"></div>
                <div class="sidebar-user-info">
                    <p class="sidebar-user-name" id="sidebarName"></p>
                    <p class="sidebar-user-role">Student</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- OVERLAY -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- MAIN CONTENT -->
    <div class="main-content">

        <header class="topbar">
            <div class="topbar-left">
                <button class="hamburger" id="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <h1 class="topbar-title">Exam History</h1>
            </div>
            <div class="topbar-right">
                <button class="theme-toggle" id="themeToggle">🌙</button>
                <a href="./profile.html">
                    <div class="topbar-avatar" id="topbarAvatar"></div>
                </a>
            </div>
        </header>

        <main class="page-content">

            <!-- STATS -->
            <div class="stats-grid mb-8">
                <div class="stat-card">
                    <div class="stat-icon stat-icon-blue">📝</div>
                    <div class="stat-info">
                        <p class="stat-value" id="statTotal">—</p>
                        <p class="stat-label">Total Attempts</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon stat-icon-green">✅</div>
                    <div class="stat-info">
                        <p class="stat-value" id="statPassed">—</p>
                        <p class="stat-label">Passed</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon stat-icon-amber">❌</div>
                    <div class="stat-info">
                        <p class="stat-value" id="statFailed">—</p>
                        <p class="stat-label">Failed</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon stat-icon-purple">🎯</div>
                    <div class="stat-info">
                        <p class="stat-value" id="statPassRate">—</p>
                        <p class="stat-label">Pass Rate</p>
                    </div>
                </div>
            </div>

            <!-- FILTERS -->
            <div class="courses-filter-bar mb-6">
                <div class="filter-search">
                    <span class="filter-search-icon">🔍</span>
                    <input
                        type="text"
                        class="form-input"
                        id="searchInput"
                        placeholder="Search by course name..."
                    >
                </div>
                <select class="filter-select" id="typeFilter">
                    <option value="">All Types</option>
                    <option value="practice">Practice</option>
                    <option value="certification">Certification</option>
                </select>
                <select class="filter-select" id="resultFilter">
                    <option value="">All Results</option>
                    <option value="passed">Passed</option>
                    <option value="failed">Failed</option>
                </select>
            </div>

            <!-- TABLE -->
            <div class="section-header mb-4">
                <h2 class="section-title">
                    All Attempts
                    <span id="attemptsCount" class="text-muted"
                        style="font-size: var(--text-sm); font-weight: 400;"></span>
                </h2>
            </div>

            <div class="card">
                <div class="admin-table-wrapper">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Course</th>
                                <th>Type</th>
                                <th>Score</th>
                                <th>Result</th>
                                <th>Time Taken</th>
                                <th>Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="attemptsTable">
                            <tr>
                                <td colspan="8" class="text-center text-muted">Loading...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/pages/exam-history.js"></script>

</body>
</html>
