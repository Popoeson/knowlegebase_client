<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Certificates — KNOWLEDGEBASE</title>

    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/pages/dashboard.css">
    <link rel="stylesheet" href="../css/pages/certificate.css">
</head>
<body>

<div class="app-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <span class="sidebar-brand-name">KNOWLEDGE<span>BASE</span></span>
        </div>

        <nav class="sidebar-nav">
            <div class="sidebar-nav-section">
                <p class="sidebar-nav-label">Main</p>
                <a href="./dashboard.html" class="sidebar-nav-item">
                    <span class="sidebar-nav-icon">🏠</span>
                    Dashboard
                </a>
                <a href="./courses.html" class="sidebar-nav-item">
                    <span class="sidebar-nav-icon">📚</span>
                    Courses
                </a>
            </div>

            <div class="sidebar-nav-section">
                <p class="sidebar-nav-label">My Activity</p>
                <a href="./exam-history.html" class="sidebar-nav-item">
                    <span class="sidebar-nav-icon">📝</span>
                    Exam History
                </a>
                <a href="./certificates.html" class="sidebar-nav-item active">
                    <span class="sidebar-nav-icon">🏆</span>
                    My Certificates
                </a>
                <a href="./transactions.html" class="sidebar-nav-item">
                    <span class="sidebar-nav-icon">💳</span>
                    Transactions
                </a>
            </div>

            <div class="sidebar-nav-section">
                <p class="sidebar-nav-label">Account</p>
                <a href="./profile.html" class="sidebar-nav-item">
                    <span class="sidebar-nav-icon">👤</span>
                    Profile
                </a>
            </div>
        </nav>

        <div class="sidebar-footer">
            <div class="sidebar-user">
                <div class="sidebar-avatar" id="sidebarAvatar"></div>
                <div class="sidebar-user-info">
                    <p class="sidebar-user-name" id="sidebarName"></p>
                    <p class="sidebar-user-role">Student</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- OVERLAY -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- MAIN CONTENT -->
    <div class="main-content">

        <header class="topbar">
            <div class="topbar-left">
                <button class="hamburger" id="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <h1 class="topbar-title">My Certificates</h1>
            </div>
            <div class="topbar-right">
                <button class="theme-toggle" id="themeToggle">🌙</button>
                <a href="./profile.html">
                    <div class="topbar-avatar" id="topbarAvatar"></div>
                </a>
            </div>
        </header>

        <main class="page-content">

            <div class="section-header mb-6">
                <h2 class="section-title">
                    Earned Certificates
                    <span id="certCount" class="text-muted"
                        style="font-size: var(--text-sm); font-weight: 400;"></span>
                </h2>
            </div>

            <div id="certificatesGrid" class="certificates-grid">
                <div class="empty-state" style="grid-column: 1/-1;">
                    <div class="empty-state-icon">⏳</div>
                    <h3 class="empty-state-title">Loading...</h3>
                </div>
            </div>

        </main>
    </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/pages/certificates.js"></script>

</body>
</html>
