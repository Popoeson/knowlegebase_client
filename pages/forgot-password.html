<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — KNOWLEDGEBASE</title>

    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/pages/auth.css">
</head>
<body>

    <div class="auth-page">

        <!-- LEFT PANEL -->
        <div class="auth-left">
            <div class="auth-brand">
                <h1 class="auth-brand-name">KNOWLEDGE<span>BASE</span></h1>
                <p class="auth-tagline">Certify what you know.</p>

                <div class="auth-features">
                    <div class="auth-feature-item">
                        <div class="auth-feature-icon">🔒</div>
                        <span>Secure password reset process</span>
                    </div>
                    <div class="auth-feature-item">
                        <div class="auth-feature-icon">📧</div>
                        <span>OTP sent directly to your email</span>
                    </div>
                    <div class="auth-feature-item">
                        <div class="auth-feature-icon">✅</div>
                        <span>Back to your account in minutes</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- RIGHT PANEL -->
        <div class="auth-right">
            <div class="auth-form-wrapper">

                <div class="auth-form-header">
                    <h2 class="auth-form-title">Forgot your password?</h2>
                    <p class="auth-form-subtitle">
                        Enter your email address and we'll send you an OTP to reset your password.
                    </p>
                </div>

                <form class="auth-form" id="forgotForm">

                    <div class="form-group">
                        <label class="form-label" for="email">Email Address</label>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            class="form-input"
                            placeholder="john@example.com"
                            autocomplete="email"
                        >
                        <span class="form-error hidden" id="emailError"></span>
                    </div>

                    <button type="submit" class="btn btn-primary w-full btn-lg" id="forgotBtn">
                        Send OTP
                    </button>

                </form>

                <div class="auth-form-footer mt-6">
                    Remembered your password? <a href="./login.html">Log in</a>
                </div>

            </div>
        </div>

    </div>

    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/pages/forgot-password.js"></script>

</body>
</html>
