<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email — KNOWLEDGEBASE</title>

    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/pages/auth.css">
</head>
<body>

    <div class="auth-page">

        <!-- LEFT PANEL -->
        <div class="auth-left">
            <div class="auth-brand">
                <h1 class="auth-brand-name">KNOWLEDGE<span>BASE</span></h1>
                <p class="auth-tagline">Certify what you know.</p>

                <div class="auth-features">
                    <div class="auth-feature-item">
                        <div class="auth-feature-icon">📧</div>
                        <span>Check your email inbox</span>
                    </div>
                    <div class="auth-feature-item">
                        <div class="auth-feature-icon">🔐</div>
                        <span>Enter your 6-digit OTP code</span>
                    </div>
                    <div class="auth-feature-item">
                        <div class="auth-feature-icon">✅</div>
                        <span>Get verified and start learning</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- RIGHT PANEL -->
        <div class="auth-right">
            <div class="auth-form-wrapper">

                <div class="auth-form-header">
                    <h2 class="auth-form-title">Verify your email</h2>
                    <p class="auth-form-subtitle">
                        We sent a 6-digit OTP to <strong id="displayEmail"></strong>. 
                        Enter it below to verify your account.
                    </p>
                </div>

                <div class="otp-inputs">
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric" id="otp0">
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric" id="otp1">
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric" id="otp2">
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric" id="otp3">
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric" id="otp4">
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric" id="otp5">
                </div>

                <div class="otp-timer" id="otpTimer">
                    OTP expires in <span id="countdown">10:00</span>
                </div>

                <button class="btn btn-primary w-full btn-lg" id="verifyBtn">
                    Verify Email
                </button>

                <div class="otp-resend mt-4">
                    <p>Didn't receive the code?
                        <button id="resendBtn" disabled>Resend OTP</button>
                    </p>
                </div>

                <div class="auth-form-footer mt-6">
                    <a href="./register.html">← Back to Register</a>
                </div>

            </div>
        </div>

    </div>

    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/pages/otp.js"></script>

</body>
</html>
