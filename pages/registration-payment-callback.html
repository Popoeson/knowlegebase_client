<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activating Account — KNOWLEDGEBASE</title>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/pages/auth.css">
</head>
<body>
<div style="
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--color-bg);
    padding: var(--space-6);
    text-align: center;
">
    <div class="card" style="max-width: 420px; width: 100%; padding: var(--space-10);">
        <div id="statusIcon" style="font-size: 3rem; margin-bottom: var(--space-4);">⏳</div>
        <h2 id="statusTitle" style="
            font-size: var(--text-xl);
            font-weight: var(--font-bold);
            margin-bottom: var(--space-2);
            color: var(--color-text-primary);
        ">Activating your account...</h2>
        <p id="statusMessage" style="
            font-size: var(--text-sm);
            color: var(--color-text-muted);
            margin-bottom: var(--space-6);
        ">Please wait while we confirm your payment.</p>
        <div id="actionArea"></div>
    </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/pages/registration-payment-callback.js"></script>
</body>
</html>
